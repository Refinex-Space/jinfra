name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  build:
    name: Maven Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Validate Maven model
        run: mvn -B -DskipTests validate

      - name: Run tests
        run: mvn -B test

      - name: Verify build
        run: mvn -B verify

      - name: Release profile dry run
        run: mvn -B -P release -DskipTests -Dgpg.skip=true -Dcentral.skip=true verify
